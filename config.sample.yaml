# NetNovelWriters Sample Configuration
# Copy this file to config.yaml and fill in your details

llm:
  # Define the models to be used by Writer Agents and Master Agent
  primary_model: "ollama/qwen3.5"
  fallback_model: "groq/llama3-70b-8192"

discord:
  bot_token: "YOUR_DISCORD_BOT_TOKEN_HERE"
  channel_id: "YOUR_DISCORD_CHANNEL_ID_HERE"

fanqienovel:
  username: "YOUR_FANQIE_USERNAME"
  password: "YOUR_FANQIE_PASSWORD"
  # Session cookie is recommended if bypassing simple login pages 
  session_cookie: "YOUR_SESSION_COOKIE_HERE"
